<html data-sql-format="default">
  <head>
  <meta charset="utf-8">
  <title>GoogleSQL Execute Query</title>
  <style>{{{css}}}</style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/stackoverflow-light.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/less.min.js"></script>
  <script>hljs.highlightAll();</script>
  </head>
  <body>
    {{> body}}
    <script>
      // "Formatted SQL" format-mode tabs. Each tab bar sets a global format
      // mode on <html>; CSS rules scoped by [data-sql-format=...] then restyle
      // every .formatted-sql block. Uses event delegation so it works for any
      // number of statements/tab bars.
      document.addEventListener('click', function(e) {
        var btn = e.target.closest && e.target.closest('.fmt-tab');
        if (!btn) return;
        var fmt = btn.getAttribute('data-format');
        document.documentElement.setAttribute('data-sql-format', fmt);
        var tabs = document.querySelectorAll('.fmt-tab');
        for (var i = 0; i < tabs.length; i++) {
          tabs[i].classList.toggle(
              'active', tabs[i].getAttribute('data-format') === fmt);
        }
      });
    </script>
    <script>{{{js}}}</script>
  </body>
</html>
