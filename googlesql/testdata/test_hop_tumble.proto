syntax = "proto2";

package googlesql_test;

import "google/protobuf/timestamp.proto";
import "googlesql/public/proto/type_annotation.proto";

option java_package = "com.google.googlesqltest";
option java_outer_classname = "TestHopAndTumbleProto";

message TestHopAndTumblePB {
  optional int32 int32_val = 1;
  optional google.protobuf.Timestamp timestamp_val = 2;
  optional int64 annotated_timestamp_val = 3
      [(googlesql.format) = TIMESTAMP_MILLIS];
  repeated int32 repeated_int32_val = 4;
  map<int32, string> test_map = 5;
}
